<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文档数据分析工具</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh; padding: 20px;
  color: #333;
}
.container { max-width: 1200px; margin: 0 auto; }
h1 {
  text-align: center; color: #fff; font-size: 2em; margin-bottom: 20px;
  text-shadow: 0 2px 4px rgba(0,0,0,0.2);
}
.card {
  background: #fff; border-radius: 16px; padding: 24px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.12); margin-bottom: 20px;
}
.card h2 { font-size: 1.2em; color: #5a4fcf; margin-bottom: 16px; }

/* 上传区域 */
.upload-area {
  border: 3px dashed #c4b5fd; border-radius: 12px; padding: 48px;
  text-align: center; cursor: pointer; transition: all 0.3s;
  background: #faf5ff;
}
.upload-area:hover, .upload-area.dragover {
  border-color: #7c3aed; background: #ede9fe;
}
.upload-area .icon { font-size: 48px; margin-bottom: 12px; }
.upload-area p { color: #6b7280; font-size: 14px; margin-top: 8px; }
.upload-area .formats { color: #9ca3af; font-size: 12px; margin-top: 4px; }
input[type="file"] { display: none; }

/* 数据预览表格 */
.table-wrap {
  overflow-x: auto; max-height: 400px; overflow-y: auto;
  border: 1px solid #e5e7eb; border-radius: 8px;
}
table {
  width: 100%; border-collapse: collapse; font-size: 13px;
  white-space: nowrap;
}
thead th {
  background: #7c3aed; color: #fff; padding: 10px 14px;
  position: sticky; top: 0; z-index: 1; text-align: left;
  cursor: pointer; user-select: none;
}
thead th:hover { background: #6d28d9; }
thead th.selected { background: #f59e0b; color: #000; }
tbody td { padding: 8px 14px; border-bottom: 1px solid #f3f4f6; }
tbody tr:hover { background: #faf5ff; }
tbody tr:nth-child(even) { background: #f9fafb; }
tbody tr:nth-child(even):hover { background: #faf5ff; }

/* 列选择面板 */
.col-selector {
  display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px;
}
.col-chip {
  padding: 6px 16px; border-radius: 20px; font-size: 13px;
  cursor: pointer; border: 2px solid #e5e7eb; background: #fff;
  transition: all 0.2s; user-select: none;
}
.col-chip:hover { border-color: #7c3aed; }
.col-chip.active { background: #7c3aed; color: #fff; border-color: #7c3aed; }
.col-chip.del-mark { background: #dc2626; color: #fff; border-color: #dc2626; text-decoration: line-through; }
.col-chip.del-mark:hover { background: #b91c1c; border-color: #b91c1c; }
.col-chip .type-badge {
  font-size: 10px; background: rgba(0,0,0,0.1); padding: 1px 6px;
  border-radius: 8px; margin-left: 4px;
}
.col-chip.active .type-badge { background: rgba(255,255,255,0.25); }

/* 统计结果 */
.stats-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 16px; margin-bottom: 20px;
}
.stat-box {
  background: linear-gradient(135deg, #f5f3ff, #ede9fe); border-radius: 12px;
  padding: 20px; text-align: center;
}
.stat-box .label { font-size: 12px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; }
.stat-box .value { font-size: 1.6em; font-weight: 700; color: #5b21b6; margin-top: 6px; }

/* 图表容器 */
.chart-container {
  background: #faf5ff; border-radius: 12px; padding: 24px; margin-bottom: 20px;
}
.chart-container h3 { font-size: 14px; color: #6b7280; margin-bottom: 16px; }
canvas { width: 100% !important; max-height: 300px; }

/* 频率分布表 */
.freq-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.freq-table th { background: #4b5563; color: #fff; padding: 8px 12px; text-align: left; }
.freq-table td { padding: 8px 12px; border-bottom: 1px solid #f3f4f6; }
.freq-bar {
  height: 16px; background: linear-gradient(90deg, #7c3aed, #a78bfa);
  border-radius: 4px; min-width: 2px;
}

/* 按钮 */
.btn {
  padding: 8px 20px; border: none; border-radius: 8px;
  font-size: 14px; cursor: pointer; transition: all 0.2s;
}
.btn-primary { background: #7c3aed; color: #fff; }
.btn-primary:hover { background: #6d28d9; }
.btn-outline {
  background: transparent; color: #7c3aed; border: 2px solid #7c3aed;
}
.btn-danger { background: #dc2626; color: #fff; }
.btn-danger:hover { background: #b91c1c; }
.btn-success { background: #059669; color: #fff; }
.btn-success:hover { background: #047857; }
.toolbar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.toolbar .info { font-size: 13px; color: #6b7280; margin-left: auto; }

/* 隐藏区域 */
.hidden { display: none !important; }

/* Tab 导航 */
.tab-nav {
  display: flex; gap: 0; margin-bottom: 20px; background: rgba(255,255,255,0.15);
  border-radius: 12px; padding: 4px; backdrop-filter: blur(10px);
}
.tab-btn {
  flex: 1; padding: 12px 24px; border: none; background: transparent;
  color: rgba(255,255,255,0.7); font-size: 15px; font-weight: 600;
  cursor: pointer; border-radius: 10px; transition: all 0.3s;
}
.tab-btn:hover { color: #fff; background: rgba(255,255,255,0.1); }
.tab-btn.active { background: #fff; color: #5a4fcf; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.tab-page { display: none; }
.tab-page.active { display: block; }

/* 主观分析相关 */
.merge-group {
  background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px;
  padding: 8px 12px; margin-bottom: 6px;
  display: flex; align-items: center; flex-wrap: wrap; gap: 6px;
}
.merge-group .canonical { font-weight: 700; color: #1e293b; font-size: 13px; }
.merge-group .mg-meta {
  font-size: 11px; color: #94a3b8; display: flex; align-items: center; gap: 6px;
}
.merge-group .mg-bar { flex: 0 0 60px; height: 6px; background: #e2e8f0; border-radius: 3px; overflow: hidden; }
.merge-group .mg-bar-fill { height: 100%; background: linear-gradient(90deg, #7c3aed, #a78bfa); border-radius: 3px; }
.merge-group .variants {
  font-size: 11px; color: #94a3b8; line-height: 1.6; width: 100%;
}
.merge-group .variants .var-tag {
  display: inline-block; background: #e2e8f0; padding: 1px 6px;
  border-radius: 4px; margin: 1px 3px 1px 0; font-size: 10px; color: #475569;
}
.merge-group .mg-actions { margin-left: auto; flex-shrink: 0; }
.subj-stat-row {
  display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px;
}
.subj-stat-card {
  background: linear-gradient(135deg, #fdf4ff, #fae8ff); border-radius: 12px;
  padding: 16px 20px; text-align: center; min-width: 120px; flex: 1;
}
.subj-stat-card .label { font-size: 11px; color: #a855f7; letter-spacing: 0.5px; }
.subj-stat-card .value { font-size: 1.5em; font-weight: 700; color: #7e22ce; margin-top: 4px; }
.similarity-slider {
  display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
  background: #f8fafc; padding: 12px 16px; border-radius: 10px;
}
.similarity-slider label { font-size: 13px; color: #64748b; white-space: nowrap; }
.similarity-slider input[type="range"] { flex: 1; }
.similarity-slider .val { font-weight: 700; color: #7c3aed; min-width: 40px; }

/* 标签聚类总结 */
.tag-summary { margin-bottom: 30px; }
.tag-summary-title {
  font-size: 16px; font-weight: 700; color: #5b21b6; margin-bottom: 16px;
  padding-bottom: 8px; border-bottom: 2px solid #ede9fe;
}
.tag-category {
  background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px;
  margin-bottom: 12px; overflow: hidden;
}
.tag-category-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; cursor: pointer; user-select: none;
  transition: background 0.2s;
}
.tag-category-header:hover { background: #f1f5f9; }
.tag-category-name {
  font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px;
}
.tag-category-badge {
  font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600;
}
.tag-category-stats {
  font-size: 12px; color: #64748b; display: flex; gap: 12px;
}
.tag-subcategories {
  padding: 0 16px 12px; display: flex; flex-wrap: wrap; gap: 6px;
}
.tag-sub-item {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 10px; border-radius: 6px; font-size: 12px;
  background: #fff; border: 1px solid #e2e8f0; transition: all 0.2s;
}
.tag-sub-item:hover { border-color: #7c3aed; background: #faf5ff; }
.tag-sub-item .tag-name { color: #1e293b; font-weight: 500; }
.tag-sub-item .tag-count { color: #7c3aed; font-weight: 600; font-size: 11px; }
.tag-sub-item .tag-pct { color: #94a3b8; font-size: 10px; }
.tag-summary-overview {
  display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px;
}
.tag-summary-stat {
  background: linear-gradient(135deg, #f0f9ff, #e0f2fe); border-radius: 10px;
  padding: 12px 16px; text-align: center; min-width: 100px; flex: 1;
}
.tag-summary-stat .label { font-size: 11px; color: #0284c7; letter-spacing: 0.5px; }
.tag-summary-stat .value { font-size: 1.3em; font-weight: 700; color: #0369a1; margin-top: 2px; }

/* 响应式 */
@media (max-width: 640px) {
  body { padding: 10px; }
  .card { padding: 16px; }
  .upload-area { padding: 32px 16px; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>
<div class="container">
  <h1>📊 文档数据分析工具</h1>

  <!-- Tab 导航（上传后显示） -->
  <div class="tab-nav hidden" id="tabNav">
    <button class="tab-btn active" onclick="switchTab('objective')">📋 客观数据分析</button>
    <button class="tab-btn" onclick="switchTab('subjective')">🏷️ 主观题分析</button>
    <button class="tab-btn" onclick="switchTab('manage')">🗑️ 删除列/导出</button>
  </div>

  <!-- 上传区域 -->
  <div class="card" id="uploadCard">
    <div class="upload-area" id="uploadArea">
      <div class="icon">📁</div>
      <div><strong>点击上传 或 拖拽文件到此处</strong></div>
      <p>支持 CSV、Excel (.xlsx/.xls)、JSON 格式</p>
      <p class="formats">文件不会上传到服务器，所有分析在本地完成</p>
    </div>
    <input type="file" id="fileInput" accept=".csv,.xlsx,.xls,.json,.tsv,.txt">
  </div>

  <!-- ========== 客观数据分析 Tab ========== -->
  <div class="tab-page active" id="tab-objective">
  <!-- 数据预览 + 列选择 -->
  <div class="card hidden" id="dataCard">
    <h2>📋 数据预览</h2>
    <div class="toolbar">
      <button class="btn btn-outline" onclick="resetAll()">重新上传</button>
      <button class="btn btn-outline" onclick="analyzeSelected()">分析选中列</button>
      <button class="btn btn-outline" onclick="selectAllCols()">全选列</button>
      <button class="btn btn-outline" onclick="deselectAllCols()">清空选择</button>
      <div class="info" id="dataInfo"></div>
    </div>
    <div style="margin-bottom: 12px;">
      <strong style="font-size:13px; color:#6b7280;" id="colHint">点击列名选择要分析的列：</strong>
    </div>
    <div class="col-selector" id="colSelector"></div>
    <div class="table-wrap" id="tableWrap"></div>
  </div>

  <!-- 分析结果 -->
  <div class="card hidden" id="resultCard">
    <h2>📈 分析结果</h2>
    <div id="resultContent"></div>
  </div>
  </div>

  <!-- ========== 主观题分析 Tab ========== -->
  <div class="tab-page" id="tab-subjective">
  <div class="card hidden" id="subjCard">
    <h2>🏷️ 主观题标签分析</h2>
    <p style="font-size:13px;color:#6b7280;margin-bottom:16px;">选择包含【标签】的文本列，系统将自动提取标签并合并相似项</p>
    <div class="toolbar">
      <button class="btn btn-outline" onclick="resetAll()">重新上传</button>
      <button class="btn btn-outline" onclick="analyzeSubjective()">分析选中列</button>
      <button class="btn btn-outline" onclick="subjSelectAll()">全选列</button>
      <button class="btn btn-outline" onclick="subjDeselectAll()">清空选择</button>
      <div class="info" id="subjDataInfo"></div>
    </div>
    <div style="margin-bottom: 12px;">
      <strong style="font-size:13px; color:#6b7280;">点击列名选择要分析的列：</strong>
    </div>
    <div class="col-selector" id="subjColSelector"></div>
  </div>

  <div class="card hidden" id="subjResultCard">
    <h2>📊 主观题分析结果</h2>
    <div id="subjResultContent"></div>
  </div>
  </div>

  <!-- ========== 删除列/导出 Tab ========== -->
  <div class="tab-page" id="tab-manage">
  <div class="card hidden" id="manageCard">
    <h2>🗑️ 删除列 / 导出数据</h2>
    <p style="font-size:13px;color:#6b7280;margin-bottom:16px;">选择要删除的列（标红），确认后可导出清理后的数据</p>
    <div class="toolbar">
      <button class="btn btn-outline" onclick="resetAll()">重新上传</button>
      <button class="btn btn-outline" id="delModeBtn" onclick="toggleDeleteMode()" style="color:#dc2626;border-color:#dc2626;">选择要删除的列</button>
      <button class="btn hidden" id="delConfirmBtn" onclick="confirmDeleteCols()" style="background:#dc2626;color:#fff;">确认删除</button>
      <button class="btn btn-outline" id="exportBtn" onclick="exportData()" style="color:#059669;border-color:#059669;">导出数据</button>
      <div class="info" id="manageDataInfo"></div>
    </div>
    <div style="margin-bottom: 12px;">
      <strong style="font-size:13px; color:#dc2626;" id="manageColHint">点击列名标记要删除的列（标红）：</strong>
    </div>
    <div class="col-selector" id="manageColSelector"></div>
    <div class="table-wrap" id="manageTableWrap"></div>
  </div>
  </div>

  </div>
</div>
<script>
// ==================== 全局变量 ====================
let rawData = [];      // [{col1: val, col2: val, ...}, ...]
let columns = [];      // ['col1', 'col2', ...]
let selectedCols = new Set();
let deleteMode = false;
let deleteCols = new Set();
let subjSelectedCols = new Set();
let originalFileExt = 'csv';
let originalFileName = 'data';

// ==================== 文件上传 ====================
const uploadArea = document.getElementById('uploadArea');
const fileInput = document.getElementById('fileInput');

uploadArea.addEventListener('click', () => fileInput.click());
uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop', e => {
  e.preventDefault(); uploadArea.classList.remove('dragover');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => { if (e.target.files.length) handleFile(e.target.files[0]); });

function handleFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  originalFileExt = ext;
  originalFileName = file.name.replace(/\.[^.]+$/, '');
  if (['xlsx', 'xls'].includes(ext)) {
    loadSheetJS(() => parseExcel(file));
  } else if (ext === 'json') {
    readText(file, parseJSON);
  } else {
    readText(file, parseCSV);
  }
}

function readText(file, callback) {
  const reader = new FileReader();
  reader.onload = e => callback(e.target.result);
  reader.readAsText(file);
}

// ==================== 动态加载 SheetJS ====================
let sheetJSLoaded = false;
function loadSheetJS(callback) {
  if (sheetJSLoaded) return callback();
  const s = document.createElement('script');
  s.src = 'https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js';
  s.onload = () => { sheetJSLoaded = true; callback(); };
  s.onerror = () => alert('加载 Excel 解析库失败，请检查网络');
  document.head.appendChild(s);
}

// ==================== 解析器 ====================
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return alert('数据行数不足');
  // 自动检测分隔符
  const sep = detectSeparator(lines[0]);
  const headers = parseCSVLine(lines[0], sep);
  const data = [];
  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const vals = parseCSVLine(lines[i], sep);
    const row = {};
    headers.forEach((h, j) => row[h] = vals[j] !== undefined ? vals[j] : '');
    data.push(row);
  }
  loadData(headers, data);
}

function detectSeparator(line) {
  const counts = { ',': 0, '\t': 0, ';': 0, '|': 0 };
  for (const ch of line) { if (ch in counts) counts[ch]++; }
  let best = ',', max = 0;
  for (const [k, v] of Object.entries(counts)) { if (v > max) { max = v; best = k; } }
  return best;
}

function parseCSVLine(line, sep) {
  const result = []; let current = ''; let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (inQuotes) {
      if (ch === '"' && line[i + 1] === '"') { current += '"'; i++; }
      else if (ch === '"') inQuotes = false;
      else current += ch;
    } else {
      if (ch === '"') inQuotes = true;
      else if (ch === sep) { result.push(current.trim()); current = ''; }
      else current += ch;
    }
  }
  result.push(current.trim());
  return result;
}

function parseExcel(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const wb = XLSX.read(e.target.result, { type: 'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(ws, { defval: '' });
    if (!json.length) return alert('Excel 文件为空');
    loadData(Object.keys(json[0]), json);
  };
  reader.readAsArrayBuffer(file);
}

function parseJSON(text) {
  try {
    let data = JSON.parse(text);
    // 如果是对象包含数组，取第一个数组值
    if (!Array.isArray(data)) {
      const arrKey = Object.keys(data).find(k => Array.isArray(data[k]));
      if (arrKey) data = data[arrKey];
      else return alert('JSON 中未找到数组数据');
    }
    if (!data.length) return alert('数据为空');
    // 扁平化对象
    const flat = data.map(item => {
      if (typeof item !== 'object' || item === null) return { value: item };
      const obj = {};
      for (const [k, v] of Object.entries(item)) {
        obj[k] = (typeof v === 'object' && v !== null) ? JSON.stringify(v) : v;
      }
      return obj;
    });
    loadData(Object.keys(flat[0]), flat);
  } catch (e) { alert('JSON 解析失败: ' + e.message); }
}

// ==================== 加载数据 ====================
function loadData(headers, data) {
  columns = headers;
  rawData = data;
  selectedCols.clear();
  subjSelectedCols.clear();
  document.getElementById('uploadCard').classList.add('hidden');
  document.getElementById('tabNav').classList.remove('hidden');
  document.getElementById('dataCard').classList.remove('hidden');
  document.getElementById('resultCard').classList.add('hidden');
  document.getElementById('subjCard').classList.remove('hidden');
  document.getElementById('subjResultCard').classList.add('hidden');
  document.getElementById('manageCard').classList.remove('hidden');
  document.getElementById('dataInfo').textContent = `${rawData.length} 行 × ${columns.length} 列`;
  document.getElementById('subjDataInfo').textContent = `${rawData.length} 行 × ${columns.length} 列`;
  document.getElementById('manageDataInfo').textContent = `${rawData.length} 行 × ${columns.length} 列`;
  renderColSelector();
  renderSubjColSelector();
  renderManageColSelector();
  renderTable();
  renderManageTable();
}

function resetAll() {
  rawData = []; columns = []; selectedCols.clear(); subjSelectedCols.clear();
  deleteMode = false; deleteCols.clear();
  fileInput.value = '';
  document.getElementById('uploadCard').classList.remove('hidden');
  document.getElementById('tabNav').classList.add('hidden');
  document.getElementById('dataCard').classList.add('hidden');
  document.getElementById('resultCard').classList.add('hidden');
  document.getElementById('subjCard').classList.add('hidden');
  document.getElementById('subjResultCard').classList.add('hidden');
  document.getElementById('manageCard').classList.add('hidden');
  // Reset tab to objective
  switchTab('objective');
}

// ==================== 列选择器 ====================
function renderColSelector() {
  const wrap = document.getElementById('colSelector');
  wrap.innerHTML = '';
  columns.forEach(col => {
    // 跳过全空列和 __EMPTY 系列列
    if (/^__EMPTY/.test(col)) return;
    if (rawData.every(r => { const v = r[col]; return v === null || v === undefined || String(v).trim() === ''; })) return;
    const chip = document.createElement('div');
    chip.className = 'col-chip' + (selectedCols.has(col) ? ' active' : '');
    const dtype = detectColType(col);
    chip.innerHTML = `${col} <span class="type-badge">${dtype === 'num' ? '数值' : '文本'}</span>`;
    chip.onclick = () => toggleCol(col);
    wrap.appendChild(chip);
  });
}

// 管理 Tab 列选择器
function renderManageColSelector() {
  const wrap = document.getElementById('manageColSelector');
  if (!wrap) return;
  wrap.innerHTML = '';
  columns.forEach(col => {
    const chip = document.createElement('div');
    chip.className = 'col-chip' + (deleteCols.has(col) ? ' del-mark' : '');
    chip.innerHTML = `${escapeHtml(col)}`;
    chip.onclick = () => toggleDeleteCol(col);
    wrap.appendChild(chip);
  });
}

function toggleDeleteCol(col) {
  if (deleteCols.has(col)) deleteCols.delete(col); else deleteCols.add(col);
  document.getElementById('delConfirmBtn').classList.toggle('hidden', deleteCols.size === 0);
  renderManageColSelector();
  renderManageTable();
}

function toggleCol(col) {
  if (selectedCols.has(col)) selectedCols.delete(col); else selectedCols.add(col);
  renderColSelector();
  updateTableHighlight();
}

function selectAllCols() { columns.forEach(c => selectedCols.add(c)); renderColSelector(); updateTableHighlight(); }
function deselectAllCols() { selectedCols.clear(); renderColSelector(); updateTableHighlight(); }

// ==================== 数据预览表格 ====================
function renderTable() {
  const wrap = document.getElementById('tableWrap');
  const maxRows = Math.min(rawData.length, 200);
  let html = '<table><thead><tr>';
  columns.forEach(col => {
    html += `<th onclick="toggleCol('${col.replace(/'/g, "\\'")}')" class="${selectedCols.has(col) ? 'selected' : ''}">${col}</th>`;
  });
  html += '</tr></thead><tbody>';
  for (let i = 0; i < maxRows; i++) {
    html += '<tr>';
    columns.forEach(col => {
      const v = rawData[i][col];
      html += `<td>${v === null || v === undefined ? '' : v}</td>`;
    });
    html += '</tr>';
  }
  html += '</tbody></table>';
  if (rawData.length > 200) html += `<p style="text-align:center;padding:8px;color:#9ca3af;font-size:12px;">仅显示前 200 行，共 ${rawData.length} 行</p>`;
  wrap.innerHTML = html;
}

function updateTableHighlight() {
  const ths = document.querySelectorAll('#tableWrap th');
  ths.forEach((th, i) => {
    th.className = selectedCols.has(columns[i]) ? 'selected' : '';
  });
}

// ==================== 类型检测 ====================
function detectColType(col) {
  let numCount = 0, total = 0;
  for (const row of rawData) {
    const v = row[col];
    if (v === null || v === undefined || v === '') continue;
    total++;
    if (!isNaN(Number(v))) numCount++;
  }
  return (total > 0 && numCount / total > 0.7) ? 'num' : 'text';
}

function getNumericValues(col) {
  return rawData.map(r => r[col]).filter(v => v !== null && v !== undefined && v !== '' && !isNaN(Number(v))).map(Number);
}

function getTextValues(col) {
  return rawData.map(r => r[col]).filter(v => v !== null && v !== undefined && v !== '');
}

// ==================== 统计计算 ====================
function calcStats(values) {
  if (!values.length) return null;
  const sorted = [...values].sort((a, b) => a - b);
  const n = sorted.length;
  const sum = sorted.reduce((a, b) => a + b, 0);
  const mean = sum / n;
  const variance = sorted.reduce((s, v) => s + (v - mean) ** 2, 0) / n;
  const std = Math.sqrt(variance);
  const median = n % 2 === 0 ? (sorted[n / 2 - 1] + sorted[n / 2]) / 2 : sorted[Math.floor(n / 2)];
  const q1 = sorted[Math.floor(n * 0.25)];
  const q3 = sorted[Math.floor(n * 0.75)];

  // 众数
  const freq = {};
  values.forEach(v => freq[v] = (freq[v] || 0) + 1);
  let maxFreq = 0, mode = null;
  for (const [k, c] of Object.entries(freq)) { if (c > maxFreq) { maxFreq = c; mode = Number(k); } }

  return { count: n, sum, mean, median, std, min: sorted[0], max: sorted[n - 1], q1, q3, mode, modeFreq: maxFreq, variance };
}

function calcTextStats(values) {
  const freq = {};
  values.forEach(v => { const s = String(v); freq[s] = (freq[s] || 0) + 1; });
  const unique = Object.keys(freq).length;
  const sorted = Object.entries(freq).sort((a, b) => b[1] - a[1]);
  const top10 = sorted.slice(0, 10);
  return { count: values.length, unique, top10, totalFreq: freq };
}

// ==================== 分析入口 ====================
function analyzeSelected() {
  if (!selectedCols.size) return alert('请先选择要分析的列');
  const content = document.getElementById('resultContent');
  content.innerHTML = '';
  const cols = [...selectedCols];

  // ===== 总结区域 =====
  const summaryHtml = renderSummary(cols);
  if (summaryHtml) {
    const summaryDiv = document.createElement('div');
    summaryDiv.innerHTML = summaryHtml;
    content.appendChild(summaryDiv);
  }

  cols.forEach(col => {
    const section = document.createElement('div');
    section.style.marginBottom = '40px';
    section.style.paddingBottom = '20px';
    section.style.borderBottom = '1px solid #e5e7eb';
    const dtype = detectColType(col);

    if (dtype === 'num') {
      const vals = getNumericValues(col);
      const stats = calcStats(vals);
      if (!stats) { section.innerHTML = `<h3>${col}：无有效数据</h3>`; content.appendChild(section); return; }
      section.innerHTML = renderNumericAnalysis(col, stats, vals);
    } else {
      const vals = getTextValues(col);
      const stats = calcTextStats(vals);
      section.innerHTML = renderTextAnalysis(col, stats);
    }
    content.appendChild(section);
  });

  document.getElementById('resultCard').classList.remove('hidden');
  document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth' });
}

// ==================== 总结区域 ====================
function renderSummary(cols) {
  const total = rawData.length;
  const textCols = cols.filter(c => detectColType(c) === 'text' && !isCorrectionCol(c));
  if (!textCols.length) return '';

  // 为每列计算正/负数据
  const colStats = textCols.map(col => {
    const labelMap = {};
    rawData.forEach(row => {
      const v = row[col];
      if (v === null || v === undefined || v === '') return;
      const label = shortLabel(String(v));
      if (!labelMap[label]) labelMap[label] = { count: 0 };
      labelMap[label].count++;
    });
    const negLabels = Object.entries(labelMap).filter(([l]) => isNegativeValue(l));
    const posLabels = Object.entries(labelMap).filter(([l]) => !isNegativeValue(l));
    const negCount = negLabels.reduce((s, [, info]) => s + info.count, 0);
    const posCount = posLabels.reduce((s, [, info]) => s + info.count, 0);

    // 找关联的备注列：匹配列名中含有相同关键词 + "备注"/"问题"
    const colKey = col.replace(/是否/g, '');
    const noteCol = columns.find(c => {
      if (c === col) return false;
      return (c.includes('备注') || c.includes('问题')) && colKey.split('').some((_, i, arr) => {
        const sub = arr.slice(0, i + 2).join('');
        return sub.length >= 2 && c.includes(sub);
      });
    });

    // 从备注列提取负面行的原因（按频率统计）
    const reasonFreq = {};
    if (noteCol) {
      const negLabelSet = new Set(negLabels.map(([l]) => l));
      rawData.forEach(row => {
        const v = row[col];
        if (v === null || v === undefined || v === '') return;
        if (!negLabelSet.has(shortLabel(String(v)))) return;
        const note = row[noteCol];
        if (note && String(note).trim()) {
          const r = shortLabel(String(note)).trim();
          if (r) reasonFreq[r] = (reasonFreq[r] || 0) + 1;
        }
      });
    }
    // 如果备注列没提取到，回退到冒号后的原因
    if (!Object.keys(reasonFreq).length) {
      negLabels.forEach(([label]) => {
        rawData.forEach(row => {
          const v = row[col];
          if (v === null || v === undefined) return;
          if (shortLabel(String(v)) !== label) return;
          const s = String(v);
          const ci = s.indexOf(':');
          const ci2 = s.indexOf('：');
          const idx = ci > 0 ? ci : ci2;
          if (idx > 0) {
            const reason = s.substring(idx + 1).trim();
            if (reason) reasonFreq[reason] = (reasonFreq[reason] || 0) + 1;
          }
        });
      });
    }
    // 按频率排序，取 Top 原因
    const negReasonsSorted = Object.entries(reasonFreq).sort((a, b) => b[1] - a[1]);

    return { col, posCount, negCount, negReasons: negReasonsSorted };
  });

  // 第一列的正数据量作为后续列的分母
  const firstPos = colStats.length > 0 ? colStats[0].posCount : total;

  let lines = [];
  colStats.forEach((cs, i) => {
    const colShort = cs.col.replace(/是否.*/, '');
    const posLabel = cs.negCount > 0 ? getPositiveLabel(cs.col) : '';
    const negLabel = cs.negCount > 0 ? getNegativeLabel(cs.col) : '';
    const denom = i === 0 ? total : firstPos;
    const rate = (cs.posCount / denom * 100).toFixed(2);
    const rateName = i === 0 ? `${colShort}有效率` : `${colShort}正确率`;

    let line = '';
    if (i === 0) {
      line = `总数据量 <strong>${total}</strong>`;
    }
    if (cs.negCount > 0) {
      if (i === 0) {
        line += `，${posLabel}数据 <strong>${cs.posCount}</strong> 条，<span style="color:#dc2626;">${negLabel}数据 <strong>${cs.negCount}</strong> 条</span>`;
      } else {
        line = `${colShort}${posLabel} <strong>${cs.posCount}</strong> 条，<span style="color:#dc2626;">${negLabel} <strong>${cs.negCount}</strong> 条</span>`;
      }
      if (cs.negReasons.length) {
        const topReasons = cs.negReasons.slice(0, 5).map(([r, cnt]) => {
          const display = r.length > 15 ? r.substring(0, 15) + '…' : r;
          return `${display}(${cnt}条)`;
        });
        line += `，主要原因：${topReasons.join('、')}`;
        if (cs.negReasons.length > 5) line += `等${cs.negReasons.length}类`;
      }
      line += `。<strong style="color:#059669;">${rateName} ${rate}%</strong>（${cs.posCount}/${denom}）`;
    } else {
      if (i > 0) line = `${colShort}全部${posLabel || '通过'}`;
      line += `。<strong style="color:#059669;">${rateName} 100%</strong>（${cs.posCount}/${denom}）`;
    }
    lines.push(line);
  });

  // 整体有效率：所有列都为正面值的行数
  if (colStats.length > 1) {
    const allPosRows = rawData.filter(row => {
      return colStats.every(cs => {
        const v = row[cs.col];
        if (v === null || v === undefined || v === '') return false;
        return !isNegativeValue(shortLabel(String(v)));
      });
    });
    const overallRate = (allPosRows.length / total * 100).toFixed(2);
    lines.push(`所有维度均通过的数据 <strong>${allPosRows.length}</strong> 条，<strong style="color:#059669;">整体有效率 ${overallRate}%</strong>（${allPosRows.length}/${total}）`);
  }

  let html = `<div style="background:linear-gradient(135deg,#f0f9ff,#e0f2fe);border-radius:12px;padding:24px;margin-bottom:32px;border-left:4px solid #0284c7;">`;
  html += `<h3 style="font-size:16px;color:#0369a1;margin-bottom:16px;">📋 分析总结</h3>`;
  html += '<ol style="margin:0;padding-left:20px;line-height:2;font-size:14px;color:#333;">';
  lines.forEach(line => html += `<li>${line}</li>`);
  html += '</ol></div>';
  return html;
}

function getPositiveLabel(col) {
  if (col.includes('合理')) return '合理';
  if (col.includes('正确')) return '正确';
  if (col.includes('完整')) return '完整';
  if (col.includes('通过')) return '通过';
  return '正常';
}
function getNegativeLabel(col) {
  if (col.includes('合理')) return '不合理';
  if (col.includes('正确')) return '错误';
  if (col.includes('完整')) return '不完整';
  if (col.includes('通过')) return '不通过';
  return '异常';
}

// ==================== 渲染：数值列分析 ====================
function renderNumericAnalysis(col, stats, vals) {
  const fmt = v => {
    if (v === null || v === undefined) return '-';
    if (Number.isInteger(v)) return v.toLocaleString();
    return Number(v.toFixed(4)).toLocaleString();
  };

  let html = `<h3 style="font-size:16px;color:#5b21b6;margin-bottom:12px;">📊 ${col} <span style="font-size:12px;color:#9ca3af;">（数值列）</span></h3>`;

  // 基础统计卡片
  html += '<div class="stats-grid">';
  const items = [
    ['总数', stats.count], ['求和', fmt(stats.sum)], ['均值', fmt(stats.mean)],
    ['中位数', fmt(stats.median)], ['标准差', fmt(stats.std)], ['方差', fmt(stats.variance)],
    ['最小值', fmt(stats.min)], ['最大值', fmt(stats.max)],
    ['Q1 (25%)', fmt(stats.q1)], ['Q3 (75%)', fmt(stats.q3)],
    ['众数', `${fmt(stats.mode)} (${stats.modeFreq}次)`], ['唯一值', new Set(vals).size]
  ];
  items.forEach(([label, value]) => {
    html += `<div class="stat-box"><div class="label">${label}</div><div class="value">${value}</div></div>`;
  });
  html += '</div>';

  // 频率分布直方图
  html += renderHistogram(col, vals);

  return html;
}

function renderHistogram(col, vals) {
  const n = vals.length;
  const min = Math.min(...vals), max = Math.max(...vals);
  if (min === max) return '<p style="color:#9ca3af;font-size:13px;">所有值相同，无法绘制分布图</p>';

  const binCount = Math.min(20, Math.max(5, Math.ceil(Math.sqrt(n))));
  const binWidth = (max - min) / binCount;
  const bins = new Array(binCount).fill(0);
  vals.forEach(v => {
    let idx = Math.floor((v - min) / binWidth);
    if (idx >= binCount) idx = binCount - 1;
    bins[idx]++;
  });
  const maxBin = Math.max(...bins);

  let html = '<div class="chart-container"><h3>频率分布</h3>';
  html += '<div style="display:flex;align-items:flex-end;height:180px;gap:2px;padding:0 4px;">';
  bins.forEach((count, i) => {
    const h = maxBin > 0 ? (count / maxBin * 160) : 0;
    const lo = (min + i * binWidth).toFixed(1);
    const hi = (min + (i + 1) * binWidth).toFixed(1);
    html += `<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;" title="${lo} ~ ${hi}: ${count}">`;
    html += `<div style="font-size:10px;color:#6b7280;margin-bottom:2px;">${count}</div>`;
    html += `<div style="width:100%;height:${h}px;background:linear-gradient(180deg,#7c3aed,#a78bfa);border-radius:3px 3px 0 0;min-height:${count > 0 ? 2 : 0}px;"></div>`;
    html += '</div>';
  });
  html += '</div>';
  // x轴标签
  html += '<div style="display:flex;justify-content:space-between;font-size:10px;color:#9ca3af;margin-top:4px;padding:0 4px;">';
  html += `<span>${min.toFixed(1)}</span><span>${((min + max) / 2).toFixed(1)}</span><span>${max.toFixed(1)}</span>`;
  html += '</div></div>';
  return html;
}

// ==================== 渲染：文本列分析 ====================
// 从值中提取标签：有冒号取冒号前，否则原值
function shortLabel(val) {
  const s = String(val);
  const idx = s.indexOf(':');
  if (idx === -1) { const idx2 = s.indexOf('：'); return idx2 > 0 ? s.substring(0, idx2).trim() : s; }
  return idx > 0 ? s.substring(0, idx).trim() : s;
}

// 判断是否为"问题"类标签（负面值）
const NEGATIVE_KEYWORDS = ['不合理','不正确','不完整','不清晰','不满足','不通过','不达标','不合格','错误','失败','异常','缺失','无效','拒绝','差','否','no','false','fail','error','invalid','incorrect','wrong'];
function isNegativeValue(val) {
  const label = shortLabel(val).toLowerCase();
  return NEGATIVE_KEYWORDS.some(kw => label.includes(kw));
}

// 判断是否为"修正/补充"类列
const CORRECTION_KEYWORDS = ['补充短答案', 'response修正', 'Response修正', 'Query修正', 'query修正'];
function isCorrectionCol(col) {
  return CORRECTION_KEYWORDS.some(kw => col.includes(kw));
}

function renderTextAnalysis(col, stats) {
  // 修正/补充类列：直接展示非空数据
  if (isCorrectionCol(col)) return renderCorrectionPreview(col, stats);
  let html = `<h3 style="font-size:16px;color:#5b21b6;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid #ede9fe;">📝 ${col} <span style="font-size:12px;color:#9ca3af;">（文本列 · 共 ${stats.count} 条）</span></h3>`;

  // 按频率聚合：冒号前相同的归为一组
  const labelMap = {};
  Object.entries(stats.totalFreq).forEach(([val, count]) => {
    const label = shortLabel(val);
    if (!labelMap[label]) labelMap[label] = { count: 0, originals: [] };
    labelMap[label].count += count;
    labelMap[label].originals.push(val);
  });
  const sorted = Object.entries(labelMap).sort((a, b) => b[1].count - a[1].count);
  const colors = ['#7c3aed','#2563eb','#059669','#d97706','#dc2626','#7c2d12','#4338ca','#0891b2','#be123c','#65a30d'];

  html += '<div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:20px;">';
  // 计算有效率（提前算，和卡片放一行）
  const negCount = sorted.filter(([label]) => isNegativeValue(label)).reduce((s, [, info]) => s + info.count, 0);
  const posCount = stats.count - negCount;
  const hasRate = negCount > 0 && posCount > 0;

  // 有效率卡片放最前面
  if (hasRate) {
    const rate = (posCount / stats.count * 100).toFixed(1);
    const colShort = col.replace(/是否.*/, '');
    html += `<div class="stat-box" style="border-left: 4px solid #059669; background: linear-gradient(135deg, #ecfdf5, #d1fae5);flex:1;min-width:140px;">
      <div class="label">${escapeHtml(colShort)}有效率</div>
      <div class="value" style="color:#059669;">${rate}%</div>
      <div style="font-size:13px;color:#6b7280;margin-top:4px;">${posCount} / ${stats.count}</div>
    </div>`;
  }

  sorted.forEach(([label, info], i) => {
    const pct = (info.count / stats.count * 100).toFixed(1);
    const isNeg = isNegativeValue(label);
    const color = isNeg ? '#dc2626' : colors[i % colors.length];
    html += `<div class="stat-box" style="border-left: 4px solid ${color};flex:1;min-width:140px;">
      <div class="label">${escapeHtml(label)}</div>
      <div class="value" ${isNeg ? 'style="color:#dc2626;"' : ''}>${info.count}</div>
      <div style="font-size:13px;color:#6b7280;margin-top:4px;">${pct}%</div>
    </div>`;
  });
  html += '</div>';

  // 当唯一值较多时（>5），额外展示 Top 10 频率条形图
  if (sorted.length > 5) {
    const top10 = sorted.slice(0, 10);
    const maxCount = top10[0][1].count;
    html += '<div class="chart-container"><h3>Top 10 频率</h3><table class="freq-table"><thead><tr><th>值</th><th>次数</th><th>占比</th><th>分布</th></tr></thead><tbody>';
    top10.forEach(([label, info]) => {
      const pct = (info.count / stats.count * 100).toFixed(1);
      const barW = (info.count / maxCount * 100).toFixed(0);
      html += `<tr><td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;">${escapeHtml(label)}</td>`;
      html += `<td>${info.count}</td><td>${pct}%</td>`;
      html += `<td style="width:40%;"><div class="freq-bar" style="width:${barW}%"></div></td></tr>`;
    });
    html += '</tbody></table></div>';
  }

  // 问题数据预览：展示负面值对应的原始行
  const negLabels = sorted.filter(([label]) => isNegativeValue(label));
  if (negLabels.length > 0) {
    const negOriginals = new Set();
    negLabels.forEach(([, info]) => info.originals.forEach(v => negOriginals.add(String(v))));
    const badRows = rawData.filter(r => negOriginals.has(String(r[col])));
    if (badRows.length > 0) {
      const previewCols = columns.filter(c => {
        const cl = c.toLowerCase();
        if (cl.includes('id')) return false;
        // 备注列：只有内容非空时才展示
        if (cl.includes('备注')) {
          return badRows.some(r => { const v = r[c]; return v !== null && v !== undefined && String(v).trim() !== ''; });
        }
        return cl.includes('query') || cl.includes('translate_query')
          || cl.includes('response') || cl.includes('translate_response')
          || c === col;
      });
      if (previewCols.indexOf(col) === -1) previewCols.unshift(col);
      const maxPreview = Math.min(badRows.length, 50);
      html += `<div class="chart-container" style="background:#fef2f2;">`;
      html += `<h3 style="color:#dc2626;">⚠️ 问题数据预览（${badRows.length} 条）</h3>`;
      html += '<div style="overflow-x:auto;max-height:300px;overflow-y:auto;">';
      html += '<table class="freq-table"><thead><tr>';
      html += '<th>#</th>';
      previewCols.forEach(c => html += `<th>${escapeHtml(c)}</th>`);
      html += '</tr></thead><tbody>';
      for (let i = 0; i < maxPreview; i++) {
        html += '<tr>';
        html += `<td style="color:#9ca3af;">${i + 1}</td>`;
        previewCols.forEach(c => {
          const v = badRows[i][c];
          const isThisCol = c === col;
          html += `<td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;${isThisCol ? 'color:#dc2626;font-weight:600;' : ''}">${escapeHtml(String(v == null ? '' : v))}</td>`;
        });
        html += '</tr>';
      }
      html += '</tbody></table></div>';
      if (badRows.length > 50) html += `<p style="font-size:12px;color:#9ca3af;margin-top:8px;">仅显示前 50 条，共 ${badRows.length} 条</p>`;
      html += '</div>';
    }
  }

  return html;
}

// ==================== 修正/补充列预览 ====================
function renderCorrectionPreview(col, stats) {
  // Query修正不单独分析，嵌入到 Query 有效率的问题数据预览中
  if (col.includes('Query修正') || col.includes('query修正')) return '';
  // 找出非空行
  const rows = rawData.filter(r => {
    const v = r[col];
    return v !== null && v !== undefined && String(v).trim() !== '';
  });
  let html = `<h3 style="font-size:16px;color:#5b21b6;margin-bottom:12px;">📝 ${escapeHtml(col)} <span style="font-size:12px;color:#9ca3af;">（共 ${rows.length} 条非空数据 / ${rawData.length} 总条数）</span></h3>`;
  if (!rows.length) {
    html += '<p style="color:#9ca3af;">该列无数据</p>';
    return html;
  }
  // 确定展示列：query、translate_query、response、translate_response + 所有修正/补充列
  const previewCols = columns.filter(c => {
    const cl = c.toLowerCase();
    if (cl.includes('id')) return false;

    return cl.includes('query') || cl.includes('translate_query')
      || cl.includes('response') || cl.includes('translate_response')
      || isCorrectionCol(c);
  });
  if (previewCols.indexOf(col) === -1) previewCols.unshift(col);
  const maxRows = Math.min(rows.length, 100);
  html += '<div style="overflow-x:auto;max-height:500px;overflow-y:auto;">';
  html += '<table class="freq-table"><thead><tr><th>#</th>';
  previewCols.forEach(c => html += `<th>${escapeHtml(c)}</th>`);
  html += '</tr></thead><tbody>';
  for (let i = 0; i < maxRows; i++) {
    html += '<tr>';
    html += `<td style="color:#9ca3af;">${i + 1}</td>`;
    previewCols.forEach(c => {
      const v = rows[i][c];
      const highlight = isCorrectionCol(c) && v && String(v).trim();
      html += `<td style="max-width:400px;overflow:hidden;text-overflow:ellipsis;white-space:normal;${highlight ? 'color:#5b21b6;font-weight:600;' : ''}">${escapeHtml(String(v == null ? '' : v))}</td>`;

  }
  html += '</tbody></table></div>';
  if (rows.length > 100) html += `<p style="font-size:12px;color:#9ca3af;margin-top:8px;">仅显示前 100 条，共 ${rows.length} 条</p>`;

// ==================== 导出数据 ====================
function exportData() {
  if (!rawData.length) return;
  const ext = originalFileExt;
  if (ext === 'json') {
    const out = rawData.map(row => {
      const obj = {};
      columns.forEach(c => obj[c] = row[c]);
      return obj;
    });
    downloadFile(JSON.stringify(out, null, 2), originalFileName + '_exported.json', 'application/json');
  } else if (['xlsx', 'xls'].includes(ext)) {
    loadSheetJS(() => {
      const ws = XLSX.utils.json_to_sheet(rawData.map(row => {
        const obj = {};
        columns.forEach(c => obj[c] = row[c]);
        return obj;
      }));
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');
      XLSX.writeFile(wb, originalFileName + '_exported.xlsx');
    });
  } else {
    // CSV
    const sep = ',';
    const lines = [columns.map(c => csvQuote(c)).join(sep)];
    rawData.forEach(row => {
      lines.push(columns.map(c => csvQuote(String(row[c] == null ? '' : row[c]))).join(sep));
    });
    downloadFile(lines.join('\n'), originalFileName + '_exported.csv', 'text/csv');
  }
}

function csvQuote(s) {
  if (s.includes(',') || s.includes('"') || s.includes('\n')) return '"' + s.replace(/"/g, '""') + '"';
  return s;
}

function downloadFile(content, filename, mime) {
  const blob = new Blob(['\uFEFF' + content], { type: mime + ';charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

function extractTags(text) {
  const tags = [];
  const s = String(text);
  // 提取【】中的标签
  const re = /[【\[](.*?)[】\]]/g;
  let m;
  while ((m = re.exec(s)) !== null) {
    const tag = m[1].trim();
    if (tag) tags.push(tag);
  }
  return tags;
}

// 构建同义词查找映射: tag -> canonical (每组第一个为标准名)
const SYNONYM_MAP = {};
SYNONYM_GROUPS.forEach(group => {
  const canonical = group[0];
  group.forEach(term => {
    SYNONYM_MAP[term.toLowerCase().replace(/\s+/g, '')] = canonical.toLowerCase().replace(/\s+/g, '');
  });
});

function areSynonyms(a, b) {
  const na = a.toLowerCase().replace(/\s+/g, '');
  const nb = b.toLowerCase().replace(/\s+/g, '');
  // 直接匹配同义词组
  const ca = SYNONYM_MAP[na];
  const cb = SYNONYM_MAP[nb];
  if (ca && cb && ca === cb) return true;
  // 部分匹配：标签名包含同义词组中的词
  for (const group of SYNONYM_GROUPS) {
    const normalizedGroup = group.map(t => t.toLowerCase().replace(/\s+/g, ''));
    const matchA = normalizedGroup.some(t => na.includes(t) || t.includes(na));
    const matchB = normalizedGroup.some(t => nb.includes(t) || t.includes(nb));
    if (matchA && matchB) return true;
  }
  return false;
}

// ==================== 主观题分析：相似度计算 ====================
function getBigrams(s) {
  const set = new Set();
  const normalized = s.toLowerCase().replace(/\s+/g, '');
  for (let i = 0; i < normalized.length - 1; i++) {
    set.add(normalized.substring(i, i + 2));
  }
  return set;
}

function jaccardSimilarity(a, b) {
  const setA = getBigrams(a);
  const setB = getBigrams(b);
  if (setA.size === 0 && setB.size === 0) return 1;
  if (setA.size === 0 || setB.size === 0) return 0;
  let intersection = 0;
  setA.forEach(x => { if (setB.has(x)) intersection++; });
  return intersection / (setA.size + setB.size - intersection);
}

// 包含关系也算相似
function isSimilarTag(a, b, threshold) {
  const na = a.toLowerCase().replace(/\s+/g, '');
  const nb = b.toLowerCase().replace(/\s+/g, '');
  // 同义词词典匹配
  if (areSynonyms(a, b)) return true;
  // 包含关系
  if (na.includes(nb) || nb.includes(na)) return true;
  return jaccardSimilarity(a, b) >= threshold;
}

// Union-Find 合并相似标签
function mergeSimilarTags(tagFreq, threshold) {
  const tags = Object.keys(tagFreq);
  const parent = {};
  tags.forEach(t => parent[t] = t);

  function find(x) {
    while (parent[x] !== x) { parent[x] = parent[parent[x]]; x = parent[x]; }
    return x;
  }
  function union(a, b) {
    const ra = find(a), rb = find(b);
    if (ra === rb) return;
    // 保留频次高的作为根
    if (tagFreq[ra] >= tagFreq[rb]) parent[rb] = ra;
    else parent[ra] = rb;
  }

  for (let i = 0; i < tags.length; i++) {
    for (let j = i + 1; j < tags.length; j++) {
      if (isSimilarTag(tags[i], tags[j], threshold)) {
        union(tags[i], tags[j]);
      }
    }
  }

  // 按组聚合
  const groups = {};
  tags.forEach(t => {
    const root = find(t);
    if (!groups[root]) groups[root] = { canonical: root, variants: [], totalCount: 0 };
    groups[root].variants.push({ tag: t, count: tagFreq[t] });
    groups[root].totalCount += tagFreq[t];
  });

  // 每组内选 canonical：优先用同义词词典中的标准名，否则选频次最高的
  Object.values(groups).forEach(g => {
    g.variants.sort((a, b) => b.count - a.count);
    // 查找是否有同义词标准名
    let bestCanonical = g.variants[0].tag;
    for (const v of g.variants) {
      const nv = v.tag.toLowerCase().replace(/\s+/g, '');
      for (const synGroup of SYNONYM_GROUPS) {
        const firstNorm = synGroup[0].toLowerCase().replace(/\s+/g, '');
        if (nv === firstNorm || nv.includes(firstNorm)) {
          bestCanonical = v.tag;
          break;
        }
      }
    }
    g.canonical = bestCanonical;
  });

  return Object.values(groups).sort((a, b) => b.totalCount - a.totalCount);
}

function classifyTag(tagName) {
  const lower = tagName.toLowerCase();
  const scores = {};
  for (const [category, config] of Object.entries(TAG_TAXONOMY)) {
    let score = 0;
    for (const kw of config.keywords) {
      if (lower.includes(kw.toLowerCase())) {
        score += kw.length;
      }
    }
    if (score > 0) scores[category] = score;
  }
  if (Object.keys(scores).length === 0) return '其他';
  return Object.entries(scores).sort((a, b) => b[1] - a[1])[0][0];
}

function renderTagSummary(cols, threshold) {
  // 汇总所有列的标签
  const globalTagFreq = {};
  let globalTotal = 0;
  cols.forEach(col => {
    rawData.forEach(row => {
      const v = row[col];
      if (v === null || v === undefined || String(v).trim() === '') return;
      const tags = extractTags(v);
      tags.forEach(t => {
        globalTagFreq[t] = (globalTagFreq[t] || 0) + 1;
        globalTotal++;
      });
    });
  });

  if (globalTotal === 0) return '';

  // 合并相似标签
  const groups = mergeSimilarTags(globalTagFreq, threshold);

  // 按一级分类聚类
  const clustered = {};
  const OTHER_KEY = '其他';
  groups.forEach(g => {
    const cat = classifyTag(g.canonical);
    if (!clustered[cat]) clustered[cat] = { tags: [], totalCount: 0 };
    clustered[cat].tags.push(g);
    clustered[cat].totalCount += g.totalCount;
  });

  // 排序：按预定义顺序，其他放最后
  const categoryOrder = Object.keys(TAG_TAXONOMY);
  const sortedCategories = [];
  categoryOrder.forEach(cat => {
    if (clustered[cat]) sortedCategories.push([cat, clustered[cat]]);
  });
  if (clustered[OTHER_KEY]) sortedCategories.push([OTHER_KEY, clustered[OTHER_KEY]]);

  // 开始渲染
  let html = '<div class="tag-summary">';
  html += '<div class="tag-summary-title">📊 所有标签聚类总结</div>';

  // 概览统计
  html += '<div class="tag-summary-overview">';
  html += `<div class="tag-summary-stat"><div class="label">分析列数</div><div class="value">${cols.length}</div></div>`;
  html += `<div class="tag-summary-stat"><div class="label">标签总数</div><div class="value">${globalTotal}</div></div>`;
  html += `<div class="tag-summary-stat"><div class="label">合并后种类</div><div class="value">${groups.length}</div></div>`;
  html += `<div class="tag-summary-stat"><div class="label">一级分类</div><div class="value">${sortedCategories.length}</div></div>`;
  html += '</div>';

  // 各一级分类
  sortedCategories.forEach(([catName, catData]) => {
    const config = TAG_TAXONOMY[catName] || { icon: '📌', color: '#64748b', bg: '#f8fafc', border: '#e2e8f0' };
    const catPct = (catData.totalCount / globalTotal * 100).toFixed(1);

    // 二级标签按频次排序
    catData.tags.sort((a, b) => b.totalCount - a.totalCount);

    html += `<div class="tag-category" style="border-color:${config.border};">`;
    html += `<div class="tag-category-header" onclick="this.parentElement.querySelector('.tag-subcategories').classList.toggle('hidden')">`;
    html += `<div class="tag-category-name">`;
    html += `<span>${config.icon}</span>`;
    html += `<span style="color:${config.color};">${escapeHtml(catName)}</span>`;
    html += `<span class="tag-category-badge" style="background:${config.bg};color:${config.color};">${catData.tags.length} 个标签</span>`;
    html += `</div>`;
    html += `<div class="tag-category-stats">`;
    html += `<span>${catData.totalCount} 次</span>`;
    html += `<span style="font-weight:600;color:${config.color};">${catPct}%</span>`;
    html += `</div>`;
    html += `</div>`;

    html += '<div class="tag-subcategories">';
    catData.tags.forEach(g => {
      const pct = (g.totalCount / globalTotal * 100).toFixed(1);
      html += `<div class="tag-sub-item">`;
      html += `<span class="tag-name">${escapeHtml(g.canonical)}</span>`;
      html += `<span class="tag-count">${g.totalCount}</span>`;
      html += `<span class="tag-pct">${pct}%</span>`;
      html += `</div>`;
    });
    html += '</div>';
    html += '</div>';
  });

  html += '</div>';
  return html;
}

function analyzeSubjective() {
  if (!subjSelectedCols.size) return alert('请先选择要分析的列');
  const content = document.getElementById('subjResultContent');
  content.innerHTML = '';
  const cols = [...subjSelectedCols];

  // 先渲染跨列标签聚类总结
  const summarySection = document.createElement('div');
  summarySection.innerHTML = renderTagSummary(cols, currentSubjThreshold);
  content.appendChild(summarySection);

  cols.forEach(col => {
    const section = document.createElement('div');
    section.style.marginBottom = '40px';
    section.style.paddingBottom = '20px';
    section.style.borderBottom = '1px solid #e5e7eb';
    section.innerHTML = renderSubjectiveCol(col, currentSubjThreshold);
    content.appendChild(section);
  });

  document.getElementById('subjResultCard').classList.remove('hidden');
  document.getElementById('subjResultCard').scrollIntoView({ behavior: 'smooth' });
}

function renderSubjectiveCol(col, threshold) {
  // 提取所有标签
  const tagFreq = {};
  let totalTags = 0;
  let rowsWithTags = 0;
  rawData.forEach(row => {
    const v = row[col];
    if (v === null || v === undefined || String(v).trim() === '') return;
    const tags = extractTags(v);
    if (tags.length > 0) rowsWithTags++;
    tags.forEach(t => {
      tagFreq[t] = (tagFreq[t] || 0) + 1;
      totalTags++;
    });
  });

  const uniqueBefore = Object.keys(tagFreq).length;
  if (uniqueBefore === 0) {
    return `<h3 style="font-size:16px;color:#5b21b6;">🏷️ ${escapeHtml(col)}</h3><p style="color:#9ca3af;margin-top:8px;">未检测到【】标签</p>`;
  }

  // 合并相似标签
  const groups = mergeSimilarTags(tagFreq, threshold);
  const uniqueAfter = groups.length;
  const merged = uniqueBefore - uniqueAfter;

  let html = `<h3 style="font-size:16px;color:#5b21b6;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid #ede9fe;">🏷️ ${escapeHtml(col)} <span style="font-size:12px;color:#9ca3af;">（主观标签分析）</span></h3>`;

  // 概览统计
  html += '<div class="subj-stat-row">';
  html += `<div class="subj-stat-card"><div class="label">含标签行数</div><div class="value">${rowsWithTags}</div></div>`;
  html += `<div class="subj-stat-card"><div class="label">标签总数</div><div class="value">${totalTags}</div></div>`;
  html += `<div class="subj-stat-card"><div class="label">原始标签种类</div><div class="value">${uniqueBefore}</div></div>`;
  html += `<div class="subj-stat-card"><div class="label">合并后种类</div><div class="value" style="color:#059669;">${uniqueAfter}</div></div>`;
  html += `<div class="subj-stat-card"><div class="label">合并数量</div><div class="value" style="color:#d97706;">${merged}</div></div>`;
  html += '</div>';

  // 相似度阈值滑块
  html += `<div class="similarity-slider">`;
  html += `<label>合并灵敏度：</label>`;
  html += `<input type="range" min="0.2" max="0.9" step="0.05" value="${threshold}" onchange="updateThreshold(this.value, '${col.replace(/'/g, "\\'")}')">`;
  html += `<span class="val" id="threshVal-${col.replace(/\s/g, '_')}">${(threshold * 100).toFixed(0)}%</span>`;
  html += `<span style="font-size:11px;color:#94a3b8;">（越低合并越激进）</span>`;
  html += '</div>';

  // 合并后的标签列表
  const maxGroup = Math.max(...groups.map(g => g.totalCount));
  // 分组：有合并的（详细卡片）vs 无合并的（紧凑展示）
  const mergedGroups = groups.filter(g => g.variants.length > 1);
  const singleGroups = groups.filter(g => g.variants.length === 1);

  // 有合并的标签 - 详细卡片
  if (mergedGroups.length > 0) {
    html += `<h4 style="font-size:14px;color:#5b21b6;margin-bottom:12px;">🔗 合并标签（${mergedGroups.length} 组）</h4>`;
    html += '<div style="margin-bottom:20px;">';
    let groupIdx = 0;
    mergedGroups.forEach(g => {
      const barW = (g.totalCount / maxGroup * 100).toFixed(0);
      const pctStr = (g.totalCount / totalTags * 100).toFixed(1);
      const previewId = `merge-preview-${col.replace(/\s/g, '_')}-${groupIdx}`;
      html += '<div class="merge-group">';
      html += `<span class="canonical">${escapeHtml(g.canonical)}</span>`;
      html += `<span class="mg-meta">`;
      html += `<span style="color:#7c3aed;font-weight:600;">${g.totalCount}</span>`;
      html += `<span>${pctStr}%</span>`;
      html += `<span style="background:#fef3c7;color:#92400e;padding:1px 6px;border-radius:4px;">${g.variants.length}变体</span>`;
      html += `</span>`;
      html += `<div class="mg-bar"><div class="mg-bar-fill" style="width:${barW}%"></div></div>`;
      html += `<span class="mg-actions"><button class="btn btn-outline" style="font-size:10px;padding:2px 8px;border-width:1px;" onclick="document.getElementById('${previewId}').classList.toggle('hidden')">详情</button></span>`;
      // 变体标签（只在有多个时显示）
      if (g.variants.length > 1) {
        html += '<div class="variants">';
        g.variants.forEach(v => {
          html += `<span class="var-tag">${escapeHtml(v.tag)}(${v.count})</span>`;
        });
        html += '</div>';
      }
      html += `<div id="${previewId}" class="hidden" style="width:100%;margin-top:6px;">`;
      // 找出包含该组任一变体的原始行
      const variantSet = new Set(g.variants.map(v => v.tag));
      const matchRows = [];
      rawData.forEach(row => {
        const v = row[col];
        if (v === null || v === undefined) return;
        const tags = extractTags(v);
        if (tags.some(t => variantSet.has(t))) matchRows.push(row);
      });
      if (matchRows.length > 0) {
        const previewCols = [col];
        columns.forEach(c => {
          if (c === col) return;
          if (/^__EMPTY/.test(c)) return;
          if (c.toLowerCase().includes('id')) return;
          if (matchRows.some(row => { const v = row[c]; return v !== null && v !== undefined && String(v).trim() !== ''; })) {
            previewCols.push(c);
          }
        });
        const maxP = Math.min(matchRows.length, 30);
        html += `<div style="overflow-x:auto;max-height:260px;overflow-y:auto;">`;
        html += '<table class="freq-table"><thead><tr><th>#</th>';
        previewCols.forEach(c => html += `<th>${escapeHtml(c)}</th>`);
        html += '</tr></thead><tbody>';
        for (let r = 0; r < maxP; r++) {
          html += '<tr>';
          html += `<td style="color:#9ca3af;">${r + 1}</td>`;
          previewCols.forEach(c => {
            const val = matchRows[r][c];
            const isMain = c === col;
            html += `<td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:normal;${isMain ? 'color:#7c3aed;font-weight:600;' : ''}">${escapeHtml(String(val == null ? '' : val))}</td>`;
          });
          html += '</tr>';
        }
        html += '</tbody></table></div>';
        if (matchRows.length > 30) html += `<p style="font-size:11px;color:#9ca3af;margin-top:4px;">仅显示前 30 条，共 ${matchRows.length} 条</p>`;
      }
      html += '</div>';
      html += '</div>';
      groupIdx++;
    });
    html += '</div>';
  }

  // 未合并的标签 - 紧凑流式布局
  if (singleGroups.length > 0) {
    html += `<h4 style="font-size:14px;color:#64748b;margin-bottom:12px;">📌 独立标签（${singleGroups.length} 个）</h4>`;
    html += '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;">';
    singleGroups.forEach(g => {
      const pct = (g.totalCount / totalTags * 100).toFixed(1);
      html += `<div style="display:inline-flex;align-items:center;gap:6px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:6px 12px;font-size:13px;">`;
      html += `<span style="color:#1e293b;font-weight:500;">${escapeHtml(g.canonical)}</span>`;
      html += `<span style="color:#7c3aed;font-weight:600;font-size:12px;">${g.totalCount}</span>`;
      html += `<span style="color:#94a3b8;font-size:11px;">${pct}%</span>`;
      html += '</div>';
    });
    html += '</div>';
  }

  // Top 20 频率表
  if (groups.length > 10) {
    const top20 = groups.slice(0, 20);
    html += '<div class="chart-container"><h3>Top 20 标签频率</h3>';
    html += '<table class="freq-table"><thead><tr><th>标签</th><th>次数</th><th>占比</th><th>变体数</th><th>分布</th></tr></thead><tbody>';
    top20.forEach(g => {
      const pct = (g.totalCount / totalTags * 100).toFixed(1);
      const barW = (g.totalCount / maxGroup * 100).toFixed(0);
      html += `<tr><td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;">${escapeHtml(g.canonical)}</td>`;
      html += `<td>${g.totalCount}</td><td>${pct}%</td><td>${g.variants.length}</td>`;
      html += `<td style="width:30%;"><div class="freq-bar" style="width:${barW}%"></div></td></tr>`;
    });
    html += '</tbody></table></div>';
  }

  return html;
}

function updateThreshold(val, col) {
  currentSubjThreshold = parseFloat(val);
  const label = document.getElementById('threshVal-' + col.replace(/\s/g, '_'));
  if (label) label.textContent = (currentSubjThreshold * 100).toFixed(0) + '%';
  // 重新分析
  analyzeSubjective();
}
</script>
